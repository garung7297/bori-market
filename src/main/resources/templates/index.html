

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>가령마켓 관리자</title>
</head>
<body>


<div th:replace="~{layout/layout :: layout}"></div>
<ul>
    <li th:each="tableName : ${tableList}" style="margin-bottom: 10px;">
        <span th:text="${tableName}" style="font-weight: bold;">테이블이름</span>
        <button th:onclick="|location.href='/@{${tableName}}/list'|">이동하기</button>
    </li>
</ul>
</body>
</html>
