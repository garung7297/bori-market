
<div th:fragment="content">

    <h2 style="margin-bottom: 20px;">🚀 BORI MARKET 실시간 (본사)대시보드</h2>
<hr>


    <div style="display: flex; gap: 20px;">
        <div style="flex: 1; background: #ffffff; border: 1px solid #dadada; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <p style="color: #888; font-size: 14px; margin: 0;">오늘의 주문</p>
            <h3 style="font-size: 28px; margin: 10px 0; color: #03c75a;">24건</h3>
        </div>
        <div style="flex: 1; background: #ffffff; border: 1px solid #dadada; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <p style="color: #888; font-size: 14px; margin: 0;">신규 가입자</p>
            <h3 style="font-size: 28px; margin: 10px 0; color: #03c75a;">5명</h3>
        </div>
        <div style="flex: 1; background: #ffffff; border: 1px solid #dadada; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <p style="color: #888; font-size: 14px; margin: 0;">미처리 문의</p>
            <h3 style="font-size: 28px; margin: 10px 0; color: #ff3f3f;">2건</h3>
        </div>
    </div>

    <div class="card">
    <div class="zone-title">🚀 실시간 데이터 </div>
    현재 접속 계정: <span th:text="${session.user_login_id}"></span>




    <table style="width: 100%; text-align: left;">
        <thead style="background-color: #f2f2f2;">
        <tr>
            <th>ID</th>
            <th>로그인 ID</th>
            <th>닉네임</th>
            <th>가입일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${allUsers}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.user_login_id}"></td>
            <td th:text="${user.nickname}"></td>
            <td th:text="${user.created_at}"></td>
        </tr>
        </tbody>
    </table>



    <ul class="table-list">
        <li th:each="entry : ${tableDataMap}" class="table-item">
            <a th:href="@{/{name}/list(name=${entry.key})}" class="btn-manage">
                <span class="table-name" th:text="${entry.key}">테이블명</span>
            </a>

            <div>
                <div>
                    <!--                    class="thumb-wrap"> class="thumb-track auto-slide">-->
                    <div th:each="row : ${entry.value}" class="thumb-item">
                        <div th:text="${row}">데이터내용</div>
                    </div>

                    <div th:if="${#lists.isEmpty(entry.value)}" class="thumb-item">
                        비어있음 📭
                    </div>
                </div>
            </div>
        </li>
    </ul>


</div>



<ul>
    <li th:each="tableName : ${tableList}" style="margin-bottom: 10px;">
        <span th:text="${tableName}" style="font-weight: bold;">테이블이름</span>
        <button th:onclick="|location.href='/@{${tableName}}/list'|">이동하기</button>
    </li>
</ul>



</div>
