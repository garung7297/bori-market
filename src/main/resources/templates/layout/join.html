<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>보리마켓 회원가입</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <style>
    .check-msg { font-size: 12px; margin-top: 5px; display: block; }
    .input-group { margin-bottom: 15px; }
    table tr td { padding: 8px 0; }
    /* 버튼 비활성화 스타일 */
    .login-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>회원가입 🥕</h2>

  <form id="joinForm" enctype="multipart/form-data">
    <table>
      <tr>
        <td>아이디 : </td>
        <td>
          <input type="text" name="user_login_id" id="user_login_id" class="login-input"
                 placeholder="영어+숫자 조합 4~12자" required>
          <span id="id-check-msg" class="check-msg" style="color: gray;">영어와 숫자를 조합하여 4~12자로 입력해주세요.</span>
        </td>
      </tr>

      <tr>
        <td>비밀번호 : </td>
        <td><input type="password" name="password" id="password" class="login-input" placeholder="비밀번호" required></td>
      </tr>
      <tr>
        <td>비밀번호 확인 : </td>
        <td>
          <input type="password" id="password_check" class="login-input" placeholder="비밀번호 확인" required>
          <span id="pw-check-msg" class="check-msg"></span>
        </td>
      </tr>

      <tr>
        <td>닉네임 :</td>
        <td><input type="text" name="nickname" id="nickname" class="login-input" placeholder="닉네임" required></td>
      </tr>
      <tr>
        <td>이메일 :</td>
        <td><input type="email" name="email" class="login-input" placeholder="example@bori.com"></td>
      </tr>

      <tr>
        <td>가입 유형 :</td>
        <td>
          <select name="role_name" class="login-input">
            <option value="고객">고객 (직거래 가능)</option>
            <option value="판매사">판매사</option>
            <option value="배송사">배송사</option>
            <option value="본사">본사</option>
          </select>
        </td>
      </tr>

      <tr>
        <td>프로필 이미지 :</td>
        <td><input type="file" name="profile_image" class="login-input" accept="image/*"></td>
      </tr>
    </table>

    <div id="error-message-wrapper" style="display: none; margin-top: 10px;">
      <div class="error-layer">
        <span class="error-icon">!</span>
        <span id="error-text"></span>
      </div>
    </div>

    <!-- 처음에는 비활성화 상태로 시작 -->
    <button type="submit" id="submitBtn" class="login-btn" style="margin-top: 20px;" disabled>가입하기</button>
  </form>

  <div class="login-footer">
    <a th:href="@{/}">홈</a> |
    <a th:href="@{/login}">이미 계정이 있나요? 로그인</a>
  </div>
</div>

<script>
  const idInput = document.getElementById('user_login_id');
  const idMsg = document.getElementById('id-check-msg');
  const pwInput = document.getElementById('password');
  const pwCheckInput = document.getElementById('password_check');
  const pwMsg = document.getElementById('pw-check-msg');
  const submitBtn = document.getElementById('submitBtn');
  const nicknameInput = document.getElementById('nickname');

  // 상태 관리 변수
  let isIdValid = false;
  let isPwValid = false;

  // 모든 조건이 맞는지 확인하여 버튼 활성화 제어
  function checkAllValid() {
      if (isIdValid && isPwValid && nicknameInput.value.trim() !== "") {
          submitBtn.disabled = false;
      } else {
          submitBtn.disabled = true;
      }
  }

  // 1. 아이디 중복/형식 체크[cite: 1]
  idInput.addEventListener('blur', function() {
      const loginId = this.value;
      if (loginId === "") {
          idMsg.textContent = "영어와 숫자를 조합하여 4~12자로 입력해주세요.";
          idMsg.style.color = "gray";
          isIdValid = false;
          checkAllValid();
          return;
      }

      const idRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{4,12}$/;
      if (!idRegex.test(loginId)) {
          idMsg.textContent = "형식이 맞지 않습니다. (영어+숫자 조합 4~12자)";
          idMsg.style.color = "red";
          isIdValid = false;
          checkAllValid();
          return;
      }

      fetch('/check_id?user_login_id=' + loginId)
          .then(res => res.json())
          .then(data => {
              idMsg.textContent = data.message;
              if (data.available) {
                  idMsg.style.color = "green";
                  isIdValid = true;
              } else {
                  idMsg.style.color = "red";
                  isIdValid = false;
              }
              checkAllValid();
          });
  });

  // 2. 비밀번호 일치 실시간 체크[cite: 1]
  function checkPassword() {
      if (pwInput.value === "" || pwCheckInput.value === "") {
          pwMsg.textContent = "";
          isPwValid = false;
      } else if (pwInput.value === pwCheckInput.value) {
          pwMsg.textContent = "비밀번호가 일치합니다.";
          pwMsg.style.color = "green";
          isPwValid = true;
      } else {
          pwMsg.textContent = "비밀번호가 일치하지 않습니다.";
          pwMsg.style.color = "red";
          isPwValid = false;
      }
      checkAllValid();
  }

  pwInput.addEventListener('input', checkPassword);
  pwCheckInput.addEventListener('input', checkPassword);
  nicknameInput.addEventListener('input', checkAllValid);

  // 3. 폼 제출 처리[cite: 1]
  document.getElementById('joinForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);

      fetch('/join_process', {
          method: 'POST',
          body: formData
      })
      .then(response => response.json())
      .then(data => {
          if (data.success) {
              alert(data.message);
              window.location.href = '/';[cite: 1]
          } else {
              document.getElementById('error-text').textContent = data.message;
              document.getElementById('error-message-wrapper').style.display = 'block';
          }
      });
  });
</script>
</body>
</html>
