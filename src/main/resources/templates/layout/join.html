<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>보리마켓 회원가입</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <style>
    .pw-toggle {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 18px;
        user-select: none;
    }
    .check-msg { font-size: 12px; margin-top: 5px; display: block; min-height: 15px; }
    table tr td { padding: 8px 0; }
  </style>
</head>
<body>

<div class="login-box">
  <h2>회원가입 🥕</h2>

  <form id="joinForm" enctype="multipart/form-data">
    <table>
      <tr>
        <td>아이디 : </td>
        <td>
          <input type="text" name="user_login_id" id="user_login_id" class="login-input"
                 placeholder="영어+숫자 조합 5~12자" required>
          <!-- 아이디 안내 메시지[cite: 2, 3] -->
          <span id="id-check-msg" class="check-msg" style="color: gray;">영어와 숫자를 조합하여 5~12자로 입력해주세요.</span>
        </td>
      </tr>

      <tr>
        <td>비밀번호 : </td>
        <td style="position: relative;">
          <input type="password" name="password" id="password" class="login-input" placeholder="비밀번호" required>
          <span class="pw-toggle" onclick="togglePassword('password', this)">👁️</span>
          <!-- 비밀번호 형식 안내 메시지[cite: 3] -->
          <span id="pw-msg" class="check-msg"></span>
        </td>
      </tr>

      <tr>
        <td>비밀번호 확인 : </td>
        <td style="position: relative;">
          <input type="password" id="password_check" class="login-input" placeholder="비밀번호 확인" required>
          <span class="pw-toggle" onclick="togglePassword('password_check', this)">👁️</span>
          <!-- 비밀번호 일치 안내 메시지[cite: 3] -->
          <span id="pw-check-msg" class="check-msg"></span>
        </td>
      </tr>

      <tr>
        <td>닉네임 :</td>
        <td><input type="text" name="nickname" id="nickname" class="login-input" placeholder="닉네임" required></td>
      </tr>
      <tr>
        <td>이메일 :</td>
        <td><input type="email" name="email" id="email" class="login-input" placeholder="example@bori.com"></td>
      </tr>

      <tr>
        <td>가입 유형 :</td>
        <td>
          <select name="role_name" class="login-input">
            <option value="고객">고객 (직거래 가능)</option>
            <option value="판매사">판매사</option>
            <option value="배송사">배송사</option>
            <option value="본사">본사</option>
          </select>
        </td>
      </tr>

      <tr>
        <td>프로필 이미지 :</td>
        <td><input type="file" name="profile_image" class="login-input" accept="image/*"></td>
      </tr>
    </table>

    <div id="error-message-wrapper" style="display: none; margin-top: 10px;">
      <div class="error-layer">
        <span class="error-icon">!</span>
        <span id="error-text"></span>
      </div>
    </div>

    <button type="submit" class="login-btn" style="margin-top: 20px;">가입하기</button>
  </form>

  <div class="login-footer">
    <a th:href="@{/}">홈</a> |
    <a th:href="@{/login}">이미 계정이 있나요? 로그인</a>
  </div>
</div>

<script th:src="@{/js/join.js}"></script>
</body>
</html>
