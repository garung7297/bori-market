<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>보리마켓 회원가입</title>
  <link rel="stylesheet" th:href="@{/css/login.css}"> </head>
<body>

<div class="login-box">
  <h2>회원가입 🥕</h2>

  <form th:action="@{/join_process}" method="post">
    <input type="text" name="user_login_id" class="login-input" placeholder="아이디" required>
    <input type="password" name="password" class="login-input" placeholder="비밀번호" required>
    <input type="text" name="nickname" class="login-input" placeholder="닉네임" required>

    <div class="error-layer" th:if="${error}">
      <span class="error-icon">!</span>
      <span th:text="${error}"></span>
    </div>

    <button type="submit" class="login-btn">가입 완료</button>
  </form>

  <div class="login-footer">
    <a th:href="@{/login}">이미 계정이 있나요? 로그인</a>
  </div>
</div>

</body>
</html>
