<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>보리마켓 회원가입</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <style>
    .check-msg { font-size: 12px; margin-top: 5px; display: block; }
    .input-group { margin-bottom: 15px; }
    table tr td { padding: 8px 0; }
  </style>
</head>
<body>

<div class="login-box">
  <h2>회원가입 🥕</h2>

  <!-- 파일 업로드가 포함되므로 id를 부여해 JS에서 제어함 -->
  <form id="joinForm" enctype="multipart/form-data">
    <table>
      <!-- 1. 아이디 입력 (영어+숫자 조합 규칙 안내) -->
      <tr>
        <td>아이디 : </td>
        <td>
          <input type="text" name="user_login_id" id="user_login_id" class="login-input"
                 placeholder="영어+숫자 조합 4~12자" required>
          <span id="id-check-msg" class="check-msg" style="color: gray;">영어와 숫자를 조합하여 4~12자로 입력해주세요.</span>
        </td>
      </tr>

      <!-- 2. 비밀번호 및 확인 -->
      <tr>
        <td>비밀번호 : </td>
        <td><input type="password" name="password" id="password" class="login-input" placeholder="비밀번호" required></td>
      </tr>
      <tr>
        <td>비밀번호 확인 : </td>
        <td>
          <input type="password" id="password_check" class="login-input" placeholder="비밀번호 확인" required>
          <span id="pw-check-msg" class="check-msg"></span>
        </td>
      </tr>

      <!-- 3. 기본 정보 -->
      <tr>
        <td>닉네임 :</td>
        <td><input type="text" name="nickname" class="login-input" placeholder="닉네임" required></td>
      </tr>
      <tr>
        <td>이메일 :</td>
        <td><input type="email" name="email" class="login-input" placeholder="example@bori.com"></td>
      </tr>

      <!-- 4. 가입 유형 선택 (권한) -->
      <tr>
        <td>가입 유형 :</td>
        <td>
          <select name="role_name" class="login-input">
            <option value="고객">고객 (직거래 가능)</option>
            <option value="판매사">판매사</option>
            <option value="배송사">배송사</option>
            <option value="본사">본사</option>
          </select>
        </td>
      </tr>

      <!-- 5. 프로필 이미지 -->
      <tr>
        <td>프로필 이미지 :</td>
        <td><input type="file" name="profile_image" class="login-input" accept="image/*"></td>
      </tr>
    </table>

    <!-- 공통 에러 메시지 영역 -->
    <div id="error-message-wrapper" style="display: none; margin-top: 10px;">
      <div class="error-layer">
        <span class="error-icon">!</span>
        <span id="error-text"></span>
      </div>
    </div>

    <button type="submit" class="login-btn" style="margin-top: 20px;">가입하기</button>
  </form>

  <div class="login-footer">
    <a th:href="@{/}">홈</a> |
    <a th:href="@{/login}">이미 계정이 있나요? 로그인</a>
  </div>
</div>

<script>
  // 1. 아이디 실시간 중복 체크 (포커스 아웃 시 실행)
  const idInput = document.getElementById('user_login_id');
  const idMsg = document.getElementById('id-check-msg');

  idInput.addEventListener('blur', function() {
      const loginId = this.value;
      if (loginId === "") {
          idMsg.textContent = "영어와 숫자를 조합하여 4~12자로 입력해주세요.";
          idMsg.style.color = "gray";
          return;
      }

      // 정규식: 최소 하나 이상의 영문자와 숫자를 포함하는 4~12자
      const idRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{4,12}$/;
      if (!idRegex.test(loginId)) {
          idMsg.textContent = "형식이 맞지 않습니다. (영어+숫자 조합 4~12자)";
          idMsg.style.color = "red";
          return;
      }

      // 서버에 중복 체크 요청
      fetch('/check_id?user_login_id=' + loginId)
          .then(res => res.json())
          .then(data => {
              idMsg.textContent = data.message;
              idMsg.style.color = data.available ? "green" : "red";
          });
  });

  // 2. 폼 제출 처리 (비밀번호 확인 및 최종 가입)
  document.getElementById('joinForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const passwordCheck = document.getElementById('password_check').value;
      const errorWrapper = document.getElementById('error-message-wrapper');
      const errorText = document.getElementById('error-text');

      // 비밀번호 일치 검사
      if (password !== passwordCheck) {
          errorText.textContent = "비밀번호가 일치하지 않습니다.";
          errorWrapper.style.display = 'block';
          return;
      }

      const formData = new FormData(this);

      // 최종 가입 처리 요청
      fetch('/join_process', {
          method: 'POST',
          body: formData
      })
      .then(response => response.json())
      .then(data => {
          if (data.success) {
              alert(data.message); // 가입 성공 알럿
              window.location.href = '/'; // 확인 누르면 바로 홈으로 이동[cite: 1]
          } else {
              errorText.textContent = data.message;
              errorWrapper.style.display = 'block';
          }
      })
      .catch(err => {
          console.error(err);
          alert("서버와 통신 중 오류가 발생했습니다.");
      });
  });
</script>
</body>
</html>
