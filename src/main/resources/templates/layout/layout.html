<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="layout">

<body>

<div class="wrap">
  <div th:replace="~{layout/header :: header}"></div>

  <main class="container">

    <section class="left-zone">
      <div th:replace="~{layout/left :: left}"></div>
    </section>
    <section class="right-zone">
      <div th:replace="~{layout/right :: right}"></div>
    </section>


  </main>



  <div th:replace="~{layout/work-zone :: workZone}"></div>
  <div th:replace="~{layout/footer :: footer}"></div>





</div>

</body>
</html>
