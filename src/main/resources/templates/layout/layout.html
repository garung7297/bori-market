<body>

  <main class="container">

    <section class="left-zone">
      <div th:replace="~{layout/left :: left}"></div>
    </section>

  <div th:replace="~{layout/footer :: footer}"></div>





</div>

<script th:src="@{/js/slider.js}"></script>
</body>
