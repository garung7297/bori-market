<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>보리마켓 로그인</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-box">
  <h2>BORI MARKET</h2>

  <form action="/login_process" method="post">
    <input type="text" name="user_login_id" class="login-input" placeholder="아이디" required>
    <input type="password" name="password" class="login-input" placeholder="비밀번호" required>

    <div class="error-layer" th:if="${error}">
      <span class="error-icon">!</span>
      <span th:text="${error}">아이디 또는 비밀번호가 틀렸습니다.</span>
    </div>

    <button type="submit" class="login-btn">로그인</button>
  </form>

  <div class="login-footer">
    <a th:href="@{/find-id}">아이디 찾기</a>
    <span>|</span>
    <a th:href="@{/find-pw}">비밀번호 찾기</a>
    <span>|</span>
    <a th:href="@{/join}" style="font-weight: bold; color: #333;">회원가입</a>
  </div>
</div>

</body>
</html>
