<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>보리마켓 로그인</title>
  <style>
    /* 네이버 느낌 나는 중앙 정렬 스타일 */
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f5f6f7; /* 네이버 배경색 느낌 */
        margin: 0;
    }
    .login-box {
        width: 400px;
        padding: 40px;
        background: white;
        border: 1px solid #dadada;
        border-radius: 8px;
        text-align: center;
    }
    .login-input {
        width: 100%;
        height: 48px;
        margin-bottom: 10px;
        padding: 0 10px;
        border: 1px solid #dadada;
        box-sizing: border-box;
    }
    .login-btn {
        width: 100%;
        height: 52px;
        background-color: #03c75a; /* 네이버 초록색 */
        color: white;
        border: none;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>BORI MARKET</h2>
  <form action="/login_process" method="post">
    <input type="text" name="user_login_id" class="login-input" placeholder="아이디" required>
    <input type="password" name="password" class="login-input" placeholder="비밀번호" required>
    <button type="submit" class="login-btn">로그인</button>
     <a th:href="@{/join}">회원가입</a>
  </form>
</div>

</body>
</html>
