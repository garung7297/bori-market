  <style>
    .tab-menu { display: flex; border-bottom: 2px solid #eee; margin-bottom: 10px; }
    .tab-btn {
        flex: 1; padding: 10px; border: none; background: none; cursor: pointer;
        font-size: 13px; font-weight: bold; color: #888; transition: 0.3s;
    }
    .tab-btn.active { color: #03c75a; border-bottom: 2px solid #03c75a; }
    .tab-content { display: none; padding: 10px 5px; }
    .tab-content.active { display: block; animation: fadeIn 0.3s; }
    .list-style { list-style: none; padding: 0; margin: 0; }
    .list-style li { padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 13px; color: #333; }
    .scroll-box { max-height: 180px; overflow-y: auto; padding-right: 5px; }
    .product-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

  <script>
    function openTab(evt, tabName) {
        const tabcontent = document.getElementsByClassName("tab-content");
        for (let i = 0; i < tabcontent.length; i++) {
            tabcontent[i].classList.remove("active");
        }
        const tablinks = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }
  </script>
