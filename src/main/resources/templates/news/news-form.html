<div class="card news-edit">

    <div class="zone-title">📰 뉴스 작성</div>

    <form method="post" action="/news" enctype="multipart/form-data">


        <!-- 제목 -->
        <div style="margin-bottom:16px;">
            <label>제목</label>
            <input type="text"
                   name="title"
                   placeholder="뉴스 제목을 입력하세요"
                   required
                   style="width:100%; padding:10px; margin-top:6px;">
        </div>

        <!-- 카테고리 -->
        <div style="margin-bottom:16px;">
            <label>카테고리</label>
            <select name="category"
                    style="width:100%; padding:10px; margin-top:6px;">
                <option value="경제">경제</option>
                <option value="주식">주식</option>
                <option value="산업">산업</option>
                <option value="기타">기타</option>
            </select>
        </div>

        <!-- 출처 -->
        <div style="margin-bottom:16px;">
            <label>출처</label>
            <input type="text"
                   name="source"
                   placeholder="ex) 직접 작성"
                   style="width:100%; padding:10px; margin-top:6px;">
        </div>

        <!-- 내용 -->
        <div style="margin-bottom:20px;">
            <div th:replace="layout/editer_box :: editer_box" class="editor-toolbar">[editer_box]</div>
            <label>내용</label>
                <input type="hidden" name="content" id="content">
                <div id="editor" contenteditable="true" class="editor"></div>
        </div>

        <!-- ✅ 이미지 업로드 -->
        <input type="file" name="images" multiple accept="image/*">

        <!--<button type="submit">등록</button>-->


        <!-- 버튼 -->
        <div style="display:flex; gap:10px;">
            <button type="submit"
                    style="padding:10px 20px;">
                등록
            </button>

            <a href="/news/list"
               style="padding:10px 20px; display:inline-flex; align-items:center;">
                취소
            </a>
        </div>

    </form>

</div>



<script th:src="@{/js/editer_box.js}"></script>
